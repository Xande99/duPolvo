<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:0; background:var(--surface-dark); height:320px; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; font-family:var(--font-ui); }
  .halo{ position:absolute; width:340px; height:340px; border-radius:50%; background:radial-gradient(circle, rgba(33,227,195,.35), transparent 68%); }
  img{ position:relative; width:300px; filter:drop-shadow(0 24px 48px rgba(0,0,0,.4)); }
  .cap{ position:absolute; bottom:16px; left:0; right:0; text-align:center; color:var(--navy-200); font-size:11px; font-weight:600; letter-spacing:.04em; }
</style></head>
<body>
  <div class="halo"></div>
  <img src="../../assets/polvo.png" alt="Mascote duPolvo" />
  <div class="cap">8 tentáculos · 4 especialidades · 1 agência</div>
</body></html>
