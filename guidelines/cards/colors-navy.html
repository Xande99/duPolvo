<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:24px; background:var(--surface-page); font-family:var(--font-ui); }
  .row{ display:flex; gap:0; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw{ flex:1; height:108px; display:flex; flex-direction:column; justify-content:flex-end; padding:10px; }
  .sw span{ font-size:11px; font-weight:700; }
  .sw small{ font-size:10px; opacity:.7; font-weight:600; }
  .lite{ color:#0F1A30; } .dk{ color:#fff; }
  .lbl{ display:flex; justify-content:space-between; margin:0 2px 10px; font-size:12px; color:var(--text-muted); font-weight:600; }
</style></head>
<body>
<div class="lbl"><span>NAVY · PRIMÁRIA</span><span>#243B67 — autoridade</span></div>
<div class="row">
  <div class="sw dk" style="background:var(--navy-900)"><span>900</span><small>#0F1A30</small></div>
  <div class="sw dk" style="background:var(--navy-800)"><span>800</span><small>#16263F</small></div>
  <div class="sw dk" style="background:var(--navy-700)"><span>700</span><small>#1C3052</small></div>
  <div class="sw dk" style="background:var(--navy-600); outline:2px solid var(--aqua-500); outline-offset:-2px"><span>600 ★</span><small>#243B67</small></div>
  <div class="sw dk" style="background:var(--navy-500)"><span>500</span><small>#2F4C82</small></div>
  <div class="sw dk" style="background:var(--navy-400)"><span>400</span><small>#4A669C</small></div>
  <div class="sw lite" style="background:var(--navy-300)"><span>300</span><small>#7B91BA</small></div>
  <div class="sw lite" style="background:var(--navy-200)"><span>200</span><small>#B3C0D8</small></div>
  <div class="sw lite" style="background:var(--navy-100)"><span>100</span><small>#DCE3F0</small></div>
  <div class="sw lite" style="background:var(--navy-50)"><span>50</span><small>#EEF2F9</small></div>
</div>
</body></html>
