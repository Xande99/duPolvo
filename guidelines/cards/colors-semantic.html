<!-- @dsCard group="Colors" viewport="700x170" name="Semantic & Support" subtitle="Success, warning, danger + on-dark usage" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:24px; background:var(--surface-page); font-family:var(--font-ui); }
  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .tok{ border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-default); }
  .cap{ height:64px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:13px; }
  .meta{ display:flex; justify-content:space-between; padding:9px 12px; background:var(--white); font-size:11px; font-weight:600; }
  .meta small{ color:var(--text-muted); }
</style></head>
<body>
<div class="grid">
  <div class="tok"><div class="cap" style="background:var(--success)">Sucesso</div><div class="meta"><span>--success</span><small>#1FB573</small></div></div>
  <div class="tok"><div class="cap" style="background:var(--warning)">Aviso</div><div class="meta"><span>--warning</span><small>#F0A93C</small></div></div>
  <div class="tok"><div class="cap" style="background:var(--danger)">Erro</div><div class="meta"><span>--danger</span><small>#E5484D</small></div></div>
  <div class="tok"><div class="cap" style="background:var(--success-bg); color:var(--success)">Sucesso BG</div><div class="meta"><span>--success-bg</span><small>#E4F7EE</small></div></div>
  <div class="tok"><div class="cap" style="background:var(--warning-bg); color:#A66A12">Aviso BG</div><div class="meta"><span>--warning-bg</span><small>#FCF1DF</small></div></div>
  <div class="tok"><div class="cap" style="background:var(--danger-bg); color:var(--danger)">Erro BG</div><div class="meta"><span>--danger-bg</span><small>#FBE7E8</small></div></div>
</div>
</body></html>
