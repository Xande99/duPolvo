<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4 · 8 · 12 · 16 · 24 · 32 · 48 · 64 · 96" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:26px 30px; background:var(--surface-page); font-family:var(--font-ui); }
  .scale{ display:flex; align-items:flex-end; gap:16px; }
  .step{ display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar{ width:var(--w); background:linear-gradient(180deg,var(--aqua-500),var(--aqua-600)); border-radius:4px; }
  .num{ font-size:12px; font-weight:700; color:var(--text-strong); }
  .tok{ font-size:10px; color:var(--text-muted); font-weight:600; }
</style></head>
<body>
  <div class="scale">
    <div class="step"><div class="bar" style="--w:4px; height:4px"></div><span class="num">4</span><span class="tok">space-1</span></div>
    <div class="step"><div class="bar" style="--w:8px; height:8px"></div><span class="num">8</span><span class="tok">space-2</span></div>
    <div class="step"><div class="bar" style="--w:12px; height:12px"></div><span class="num">12</span><span class="tok">space-3</span></div>
    <div class="step"><div class="bar" style="--w:16px; height:16px"></div><span class="num">16</span><span class="tok">space-4</span></div>
    <div class="step"><div class="bar" style="--w:24px; height:24px"></div><span class="num">24</span><span class="tok">space-6</span></div>
    <div class="step"><div class="bar" style="--w:32px; height:32px"></div><span class="num">32</span><span class="tok">space-8</span></div>
    <div class="step"><div class="bar" style="--w:48px; height:48px"></div><span class="num">48</span><span class="tok">space-12</span></div>
    <div class="step"><div class="bar" style="--w:64px; height:64px"></div><span class="num">64</span><span class="tok">space-16</span></div>
    <div class="step"><div class="bar" style="--w:96px; height:96px"></div><span class="num">96</span><span class="tok">space-24</span></div>
  </div>
</body></html>
