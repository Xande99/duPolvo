<!-- @dsCard group="Colors" viewport="700x180" name="Aqua — Accent" subtitle="Energy. Core #21E3C3 with tints & shades" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:24px; background:var(--surface-page); font-family:var(--font-ui); }
  .row{ display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); }
  .sw{ flex:1; height:108px; display:flex; flex-direction:column; justify-content:flex-end; padding:10px; }
  .sw span{ font-size:11px; font-weight:700; }
  .sw small{ font-size:10px; opacity:.7; font-weight:600; }
  .lite{ color:#0F1A30; } .dk{ color:#fff; }
  .lbl{ display:flex; justify-content:space-between; margin:0 2px 10px; font-size:12px; color:var(--text-muted); font-weight:600; }
</style></head>
<body>
<div class="lbl"><span>AQUA · ACENTO</span><span>#21E3C3 — energia</span></div>
<div class="row">
  <div class="sw dk" style="background:var(--aqua-700)"><span>700</span><small>#0E9C86</small></div>
  <div class="sw dk" style="background:var(--aqua-600)"><span>600</span><small>#14C0A6</small></div>
  <div class="sw lite" style="background:var(--aqua-500); outline:2px solid var(--navy-600); outline-offset:-2px"><span>500 ★</span><small>#21E3C3</small></div>
  <div class="sw lite" style="background:var(--aqua-400)"><span>400</span><small>#4DEAD0</small></div>
  <div class="sw lite" style="background:var(--aqua-300)"><span>300</span><small>#82F1DF</small></div>
  <div class="sw lite" style="background:var(--aqua-200)"><span>200</span><small>#B4F7ED</small></div>
  <div class="sw lite" style="background:var(--aqua-100)"><span>100</span><small>#DCFBF6</small></div>
  <div class="sw lite" style="background:var(--aqua-50)"><span>50</span><small>#EFFEFB</small></div>
</div>
</body></html>
