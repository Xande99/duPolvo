<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:26px 30px; background:var(--surface-page); }
  .meta{ font-family:var(--font-ui); font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:.04em; }
  .display{ font:800 64px/1.02 var(--font-display); letter-spacing:-.03em; color:var(--text-strong); margin:8px 0 6px; }
  .h1{ font:800 44px/1.1 var(--font-display); letter-spacing:-.015em; color:var(--text-strong); margin:18px 0 4px; }
  em{ color:var(--aqua-700); font-style:normal; }
</style></head>
<body>
  <div class="meta">DISPLAY · 800 · clamp 52→88px · tracking −3%</div>
  <div class="display">Marketing com <em>tentáculos</em></div>
  <div class="meta">H1 · 800 · clamp 40→60px · tracking −1.5%</div>
  <div class="h1">A agência que abraça seu projeto inteiro</div>
</body></html>
