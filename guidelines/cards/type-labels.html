<!-- @dsCard group="Type" viewport="700x180" name="Labels, caption & overline" subtitle="UI text — SemiBold/Bold, 24pt optical cut" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:26px 30px; background:var(--surface-page); display:flex; flex-direction:column; gap:18px; }
  .meta{ font-family:var(--font-ui); font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:.04em; }
  .item{ display:flex; align-items:baseline; gap:18px; }
  .overline{ font:700 12px/1 var(--font-ui); letter-spacing:.16em; text-transform:uppercase; color:var(--text-accent); }
  .label{ font:600 14px/1.3 var(--font-ui); letter-spacing:-.015em; color:var(--text-strong); }
  .caption{ font:400 13px/1.4 var(--font-ui); color:var(--text-muted); }
</style></head>
<body>
  <div class="item"><span class="meta" style="width:110px">OVERLINE</span><span class="overline">Nossos serviços</span></div>
  <div class="item"><span class="meta" style="width:110px">LABEL</span><span class="label">Solicitar orçamento</span></div>
  <div class="item"><span class="meta" style="width:110px">CAPTION</span><span class="caption">Resposta em até 24h úteis · sem compromisso</span></div>
</body></html>
