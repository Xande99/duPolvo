<!-- @dsCard group="Colors" viewport="700x180" name="Neutrals — Ink & Paper" subtitle="Near-black #0D0D0D → near-white #F5F5FD" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="utf-8" /><link rel="stylesheet" href="../../styles.css" />
<style>
  body{ margin:0; padding:24px; background:var(--surface-page); font-family:var(--font-ui); }
  .row{ display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--border-default); }
  .sw{ flex:1; height:108px; display:flex; flex-direction:column; justify-content:flex-end; padding:10px; }
  .sw span{ font-size:11px; font-weight:700; }
  .sw small{ font-size:10px; opacity:.7; font-weight:600; }
  .lite{ color:#0F1A30; } .dk{ color:#fff; }
  .lbl{ display:flex; justify-content:space-between; margin:0 2px 10px; font-size:12px; color:var(--text-muted); font-weight:600; }
</style></head>
<body>
<div class="lbl"><span>NEUTRALS · INK → PAPER</span><span>texto, superfícies, bordas</span></div>
<div class="row">
  <div class="sw dk" style="background:var(--ink-900)"><span>Ink 900 ★</span><small>#0D0D0D</small></div>
  <div class="sw dk" style="background:var(--ink-700)"><span>700</span><small>#2C2E33</small></div>
  <div class="sw dk" style="background:var(--ink-500)"><span>500</span><small>#62656D</small></div>
  <div class="sw lite" style="background:var(--ink-300)"><span>300</span><small>#B6B9C2</small></div>
  <div class="sw lite" style="background:var(--ink-200)"><span>200</span><small>#D7D9E2</small></div>
  <div class="sw lite" style="background:var(--ink-100)"><span>100</span><small>#EBECF3</small></div>
  <div class="sw lite" style="background:var(--paper)"><span>Paper ★</span><small>#F5F5FD</small></div>
  <div class="sw lite" style="background:var(--white)"><span>White</span><small>#FFFFFF</small></div>
</div>
</body></html>
